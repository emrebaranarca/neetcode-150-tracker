<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeetCode 150 Tracker — LeetCode Çalışma Planı</title>
  <meta name="description" content="NeetCode 150 LeetCode sorularını takip et. 18 kategori, 150 soru, tüm temel algoritmik pattern'ler. İlerlemenizi kaydedin.">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #e8e6e3;
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 3px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Header */
    .header {
      border-bottom: 1px solid #1a1a25;
      padding: 28px 24px 24px;
      background: linear-gradient(180deg, #0f0f18 0%, #0a0a0f 100%);
    }
    .header-inner { max-width: 960px; margin: 0 auto; }
    .header-badge { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .header-badge span:first-child { font-size: 11px; letter-spacing: 3px; color: #00b341; font-weight: 600; text-transform: uppercase; }
    .header-badge span:last-child { font-size: 10px; padding: 2px 8px; background: #00b34118; color: #00b341; border-radius: 3px; letter-spacing: 1px; }
    .header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; margin-bottom: 4px; }
    .header p { font-size: 12px; color: #666; letter-spacing: 0.3px; }

    .container { max-width: 960px; margin: 0 auto; padding: 24px; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: #12121c; border-radius: 8px; padding: 16px 18px; border: 1px solid #1a1a25; }
    .stat-label { font-size: 10px; letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
    .stat-value { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; color: #fff; }
    .stat-value span { font-size: 14px; color: #444; }
    .progress-bar { margin-top: 10px; height: 3px; background: #1a1a25; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

    /* Filters */
    .filters { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; align-items: center; }
    .search-input {
      background: #12121c; border: 1px solid #1a1a25; color: #e8e6e3;
      padding: 7px 14px; border-radius: 6px; font-size: 12px; font-family: inherit; outline: none; width: 220px;
    }
    .search-input:focus { border-color: #2a2a35; }
    .search-input::placeholder { color: #444; }
    .select-filter {
      background: #12121c; border: 1px solid #1a1a25; color: #e8e6e3;
      padding: 7px 12px; border-radius: 6px; font-size: 12px; font-family: inherit; outline: none; cursor: pointer;
    }
    .filter-btn {
      padding: 6px 14px; border-radius: 6px; font-size: 11px; font-family: inherit;
      font-weight: 500; letter-spacing: 0.5px; cursor: pointer; border: 1px solid transparent;
      background: transparent; color: #666; transition: all 0.15s ease;
    }
    .filter-btn:hover { transform: translateY(-1px); }
    .filter-btn.active { color: #fff; }
    .filter-count { font-size: 11px; color: #444; margin-bottom: 20px; padding-left: 2px; }

    /* Category */
    .category { margin-bottom: 4px; background: #0e0e16; border-radius: 8px; border: 1px solid #1a1a25; overflow: hidden; }
    .cat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; background: #12121c; cursor: pointer; transition: background 0.15s;
    }
    .cat-header:hover { background: #16162a; }
    .cat-header-left { display: flex; align-items: center; gap: 10px; }
    .cat-icon { font-size: 16px; opacity: 0.7; }
    .cat-name { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; color: #ddd; }
    .cat-count { font-size: 11px; color: #555; }
    .cat-arrow { font-size: 10px; color: #444; transition: transform 0.2s ease; display: inline-block; }
    .cat-arrow.collapsed { transform: rotate(-90deg); }

    /* Problem Row */
    .problem-row {
      display: grid; grid-template-columns: 32px 1fr auto auto;
      align-items: center; gap: 12px; padding: 10px 18px;
      border-top: 1px solid #14141f; transition: background 0.15s; cursor: default;
    }
    .problem-row:hover { background: #14141f; }
    .problem-row.solved { background: #0d1a12; }

    .check-box {
      width: 20px; height: 20px; border-radius: 4px;
      border: 2px solid #2a2a35; background: transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: #00b341; cursor: pointer; transition: all 0.2s ease;
    }
    .check-box:hover { transform: scale(1.15); border-color: #00b341; }
    .check-box.checked { border-color: #00b341; background: #00b34122; }

    .problem-link {
      color: #ccc; text-decoration: none; font-size: 13px; font-weight: 400;
      transition: color 0.15s;
    }
    .problem-link:hover { color: #fff; }
    .problem-link.solved-link { color: #557755; text-decoration: line-through; }
    .problem-id { color: #444; margin-right: 6px; font-size: 11px; }
    .blind-badge {
      margin-left: 8px; font-size: 9px; padding: 1px 5px;
      background: #1e1533; color: #a78bfa; border-radius: 3px; vertical-align: middle;
    }
    .diff-badge {
      font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 500; letter-spacing: 0.5px; white-space: nowrap;
    }
    .diff-easy { background: #0d2818; color: #00b341; }
    .diff-medium { background: #2d1f00; color: #ffa116; }
    .diff-hard { background: #2d0a0a; color: #ff375f; }
    .pattern-badge {
      font-size: 10px; color: #555; background: #14141f;
      padding: 3px 8px; border-radius: 4px; white-space: nowrap;
    }

    /* Reset Button */
    .reset-btn {
      background: #1a0a0a; color: #ff375f; border: 1px solid #ff375f33;
      padding: 6px 14px; border-radius: 6px; font-size: 11px; font-family: inherit;
      cursor: pointer; transition: all 0.15s; font-weight: 500; letter-spacing: 0.5px;
    }
    .reset-btn:hover { background: #2d0a0a; }

    .footer { text-align: center; padding: 32px 0 16px; font-size: 11px; color: #333; }
    .footer a { color: #444; text-decoration: none; }
    .footer a:hover { color: #666; }

    /* Responsive */
    @media (max-width: 700px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .problem-row { grid-template-columns: 32px 1fr auto; gap: 8px; padding: 10px 14px; }
      .pattern-badge { display: none; }
      .header h1 { font-size: 22px; }
      .search-input { width: 100%; }
      .filters { gap: 6px; }
    }
    @media (max-width: 420px) {
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .stat-value { font-size: 22px; }
      .container { padding: 16px; }
    }
  </style>
</head>

g-rooms-ii/",pattern:"Heap",b75:1},{id:1851,name:"Minimum Interval to Include Each Query",cat:"Intervals",diff:"Hard",url:"https://leetcode.com/problems/minimum-interval-to-include-each-query/",pattern:"Sweep Line"},{id:48,name:"Rotate Image",cat:"Math & Geometry",diff:"Medium",url:"https://leetcode.com/problems/rotate-image/",pattern:"Matrix",b75:1},{id:54,name:"Spiral Matrix",cat:"Math & Geometry",diff:"Medium",url:"https://leetcode.com/problems/spiral-matrix/",pattern:"Matrix",b75:1},{id:73,name:"Set Matrix Zeroes",cat:"Math & Geometry",diff:"Medium",url:"https://leetcode.com/problems/set-matrix-zeroes/",pattern:"Matrix",b75:1},{id:202,name:"Happy Number",cat:"Math & Geometry",diff:"Easy",url:"https://leetcode.com/problems/happy-number/",pattern:"Cycle Detection"},{id:66,name:"Plus One",cat:"Math & Geometry",diff:"Easy",url:"https://leetcode.com/problems/plus-one/",pattern:"Math"},{id:50,name:"Pow(x, n)",cat:"Math & Geometry",diff:"Medium",url:"https://leetcode.com/problems/powx-n/",pattern:"Math"},{id:43,name:"Multiply Strings",cat:"Math & Geometry",diff:"Medium",url:"https://leetcode.com/problems/multiply-strings/",pattern:"Math"},{id:2013,name:"Detect Squares",cat:"Math & Geometry",diff:"Medium",url:"https://leetcode.com/problems/detect-squares/",pattern:"Geometry + Hash Map"},{id:136,name:"Single Number",cat:"Bit Manipulation",diff:"Easy",url:"https://leetcode.com/problems/single-number/",pattern:"XOR"},{id:191,name:"Number of 1 Bits",cat:"Bit Manipulation",diff:"Easy",url:"https://leetcode.com/problems/number-of-1-bits/",pattern:"Bit Manipulation",b75:1},{id:338,name:"Counting Bits",cat:"Bit Manipulation",diff:"Easy",url:"https://leetcode.com/problems/counting-bits/",pattern:"DP + Bit",b75:1},{id:190,name:"Reverse Bits",cat:"Bit Manipulation",diff:"Easy",url:"https://leetcode.com/problems/reverse-bits/",pattern:"Bit Manipulation",b75:1},{id:268,name:"Missing Number",cat:"Bit Manipulation",diff:"Easy",url:"https://leetcode.com/problems/missing-number/",pattern:"XOR / Math",b75:1},{id:371,name:"Sum of Two Integers",cat:"Bit Manipulation",diff:"Medium",url:"https://leetcode.com/problems/sum-of-two-integers/",pattern:"Bit Manipulation",b75:1},{id:7,name:"Reverse Integer",cat:"Bit Manipulation",diff:"Medium",url:"https://leetcode.com/problems/reverse-integer/",pattern:"Math"}];

const CATEGORIES=["Arrays & Hashing","Two Pointers","Sliding Window","Stack","Binary Search","Linked List","Trees","Heap / Priority Queue","Backtracking","Tries","Graphs","Advanced Graphs","1-D DP","2-D DP","Greedy","Intervals","Math & Geometry","Bit Manipulation"];

const CAT_ICONS={"Arrays & Hashing":"⬡","Two Pointers":"⟷","Sliding Window":"◫","Stack":"▤","Binary Search":"◎","Linked List":"⟶","Trees":"🌳","Heap / Priority Queue":"△","Backtracking":"↩","Tries":"🔤","Graphs":"◇","Advanced Graphs":"◈","1-D DP":"▰","2-D DP":"▦","Greedy":"⚡","Intervals":"━","Math & Geometry":"∑","Bit Manipulation":"⊕"};

// State
let solved = {};
let filter = "All";
let diffFilter = "All";
let showBlind75 = false;
let expandedCats = new Set(CATEGORIES);
let searchQuery = "";

// LocalStorage
function loadSolved() {
  try { solved = JSON.parse(localStorage.getItem("nc150_solved") || "{}"); } catch(e) { solved = {}; }
}
function saveSolved() {
  try { localStorage.setItem("nc150_solved", JSON.stringify(solved)); } catch(e) {}
}
loadSolved();

function getFiltered() {
  return PROBLEMS.filter(p => {
    if (filter !== "All" && p.cat !== filter) return false;
    if (diffFilter !== "All" && p.diff !== diffFilter) return false;
    if (showBlind75 && !p.b75) return false;
    if (searchQuery && !p.name.toLowerCase().includes(searchQuery.toLowerCase()) && !p.pattern.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    return true;
  });
}

function getGrouped(filtered) {
  const g = {};
  filtered.forEach(p => { if (!g[p.cat]) g[p.cat] = []; g[p.cat].push(p); });
  return g;
}

function countSolved(arr) { return arr.filter(p => solved[p.id]).length; }
function countByDiff(diff) { return PROBLEMS.filter(p => p.diff === diff); }

function render() {
  const filtered = getFiltered();
  const grouped = getGrouped(filtered);
  const totalSolved = countSolved(PROBLEMS);
  const total = PROBLEMS.length;
  const pct = Math.round((totalSolved / total) * 100);

  const stats = [
    { label: "Easy", color: "#00b341", solved: countSolved(countByDiff("Easy")), total: countByDiff("Easy").length },
    { label: "Medium", color: "#ffa116", solved: countSolved(countByDiff("Medium")), total: countByDiff("Medium").length },
    { label: "Hard", color: "#ff375f", solved: countSolved(countByDiff("Hard")), total: countByDiff("Hard").length },
  ];

  let html = '';

  // Stats
  html += '<div class="stats-grid">';
  html += `<div class="stat-card"><div class="stat-label" style="color:#555">Toplam</div><div class="stat-value">${totalSolved}<span>/${total}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,#00b341,#00d68f)"></div></div></div>`;
  stats.forEach(s => {
    const sp = s.total ? Math.round((s.solved/s.total)*100) : 0;
    html += `<div class="stat-card"><div class="stat-label" style="color:${s.color}">${s.label}</div><div class="stat-value">${s.solved}<span>/${s.total}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${sp}%;background:${s.color}"></div></div></div>`;
  });
  html += '</div>';

  // Filters
  html += '<div class="filters">';
  html += `<input class="search-input" type="text" placeholder="Soru veya pattern ara..." value="${searchQuery}" oninput="searchQuery=this.value;render()">`;
  html += `<select class="select-filter" onchange="filter=this.value;render()"><option value="All"${filter==="All"?" selected":""}>Tüm Kategoriler</option>`;
  CATEGORIES.forEach(c => { html += `<option value="${c}"${filter===c?" selected":""}>${c}</option>`; });
  html += '</select>';

  ["All","Easy","Medium","Hard"].forEach(d => {
    const active = diffFilter === d;
    let bg = "transparent", border = "transparent", col = "#666";
    if (active) {
      col = "#fff";
      if (d === "All") { bg = "#2a2a35"; border = "#3a3a45"; }
      else if (d === "Easy") { bg = "#0d2818"; border = "#00b34133"; }
      else if (d === "Medium") { bg = "#2d1f00"; border = "#ffa11633"; }
      else { bg = "#2d0a0a"; border = "#ff375f33"; }
    }
    html += `<button class="filter-btn${active?" active":""}" style="color:${col};background:${bg};border-color:${border}" onclick="diffFilter='${d}';render()">${d==="All"?"Hepsi":d}</button>`;
  });

  html += `<button class="filter-btn${showBlind75?" active":""}" style="color:${showBlind75?"#a78bfa":"#666"};background:${showBlind75?"#1e1533":"transparent"};border-color:${showBlind75?"#a78bfa33":"transparent"}" onclick="showBlind75=!showBlind75;render()">🧠 Blind 75</button>`;
  html += `<button class="reset-btn" onclick="if(confirm('Tüm ilerlemeniz silinecek. Emin misiniz?')){solved={};saveSolved();render();}">Sıfırla</button>`;
  html += '</div>';
  html += `<div class="filter-count">${filtered.length} soru gösteriliyor</div>`;

  // Categories
  CATEGORIES.filter(cat => grouped[cat]).forEach(cat => {
    const problems = grouped[cat];
    const catSolved = countSolved(problems);
    const expanded = expandedCats.has(cat);

    html += `<div class="category">`;
    html += `<div class="cat-header" onclick="expandedCats.has('${cat}')?expandedCats.delete('${cat}'):expandedCats.add('${cat}');render()">`;
    html += `<div class="cat-header-left"><span class="cat-icon">${CAT_ICONS[cat]}</span><span class="cat-name">${cat}</span><span class="cat-count">${catSolved}/${problems.length}</span></div>`;
    html += `<span class="cat-arrow${expanded?"":" collapsed"}">▼</span>`;
    html += `</div>`;

    if (expanded) {
      problems.forEach(p => {
        const isSolved = !!solved[p.id];
        const diffClass = p.diff === "Easy" ? "diff-easy" : p.diff === "Medium" ? "diff-medium" : "diff-hard";
        html += `<div class="problem-row${isSolved?" solved":""}">`;
        html += `<div class="check-box${isSolved?" checked":""}" onclick="solved[${p.id}]=!solved[${p.id}];if(!solved[${p.id}])delete solved[${p.id}];saveSolved();render()">${isSolved?"✓":""}</div>`;
        html += `<div><a class="problem-link${isSolved?" solved-link":""}" href="${p.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span class="problem-id">#${p.id}</span>${p.name}</a>${p.b75?'<span class="blind-badge">B75</span>':''}</div>`;
        html += `<span class="diff-badge ${diffClass}">${p.diff}</span>`;
        html += `<span class="pattern-badge">${p.pattern}</span>`;
        html += `</div>`;
      });
    }
    html += `</div>`;
  });

  html += `<div class="footer">neetcode.io · leetcode.com · Blind 75 + 75 ek soru<br><br><a href="https://neetcode.io/practice" target="_blank">NeetCode</a> · <a href="https://github.com/envico801/Neetcode-150-and-Blind-75" target="_blank">GitHub</a></div>`;

  document.getElementById("app").innerHTML = html;
}

render();
</script>
</body>
</html>
